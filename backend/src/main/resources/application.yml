spring:
  profiles:
    default: local
  application:
    name: gestao-fiscal-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gestao_fiscal}
    username: ${SPRING_DATASOURCE_USERNAME:gestao}
    password: ${SPRING_DATASOURCE_PASSWORD:gestao123}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    br.com.entrevista: DEBUG

app:
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost,http://localhost:4200,http://localhost:8081}

# JWT: ver application-local.yml (dev) ou application-docker.yml (containers)
