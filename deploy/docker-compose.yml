# Stack na VPS (igual dev): Postgres + Keycloak no Docker + apps (GHCR) + gateway.
# Infra local: postgres:5432 e keycloak:8080 na rede compose; só apps vêm do GHCR.
# Uso manual: cp .env.example .env && ./deploy.sh http://SEU_IP
services:
  postgres:
    image: postgres:16-alpine
    container_name: gestao-fiscal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestao_fiscal
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-gestao}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-gestao123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestao -d gestao_fiscal"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: gestao-fiscal-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --hostname-strict=false
      - --hostname-url=${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_RELATIVE_PATH: /
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY: none
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./config/keycloak/realm-entrevista.json:/opt/keycloak/data/import/realm-entrevista.json:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /realms/entrevista HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && head -1 <&3 | grep -q 200'"]
      interval: 5s
      timeout: 10s
      retries: 36
      start_period: 120s

  backend:
    image: ${GHCR_REGISTRY}/backend:${IMAGE_TAG:-latest}
    container_name: gestao-fiscal-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/gestao_fiscal}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-gestao}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-gestao123}
      APP_CORS_ORIGINS: ${APP_PUBLIC_URL:-http://localhost}
      APP_KEYCLOAK_TOKEN_ISSUER: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}/realms/entrevista
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/actuator/health/liveness | grep -q UP || curl -sf http://localhost:8082/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 150s

  frontend-jsf:
    image: ${GHCR_REGISTRY}/jsf:${IMAGE_TAG:-latest}
    container_name: gestao-fiscal-jsf
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      API_BASE_URL: http://backend:8082
      ANGULAR_BASE_URL: ${APP_PUBLIC_URL:-http://localhost}
      PUBLIC_BASE_URL: ${APP_PUBLIC_URL:-http://localhost}
      OAUTH2_REDIRECT_URI: ${APP_PUBLIC_URL:-http://localhost}/login/oauth2/code/keycloak
      OAUTH2_POST_LOGOUT_REDIRECT_URI: ${APP_PUBLIC_URL:-http://localhost}/login-jsf
      KEYCLOAK_CLIENT_ID: legacy-jsf
      KEYCLOAK_LOGOUT_ISSUER: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}/realms/entrevista
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_AUTHORIZATION_URI: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}/realms/entrevista/protocol/openid-connect/auth
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8081/actuator/health/liveness 2>/dev/null | grep -q UP || curl -sf http://127.0.0.1:8081/actuator/health 2>/dev/null | grep -q UP"]
      interval: 15s
      timeout: 10s
      retries: 24
      start_period: 180s

  frontend-angular:
    image: ${GHCR_REGISTRY}/angular:${IMAGE_TAG:-latest}
    container_name: gestao-fiscal-angular
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/index.html | grep -q app-root || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  gateway:
    image: nginx:1.27-alpine
    container_name: gestao-fiscal-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/theme:/usr/share/nginx/html/theme:ro
    depends_on:
      frontend-angular:
        condition: service_healthy
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      frontend-jsf:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/dashboard-angular 2>/dev/null | grep -q app-root"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  postgres_data:
