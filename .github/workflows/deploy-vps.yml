# Deploy automático na VPS via SSH (após publicar imagens no GHCR).
# Secrets: VPS_HOST (só IP ou hostname), VPS_USER, VPS_SSH_KEY
# Variables: APP_PUBLIC_URL, KEYCLOAK_PUBLIC_URL | opcional: VPS_SSH_PORT, VPS_DEPLOY_PATH
#
# Se falhar com "i/o timeout" na porta 22: libere SSH no firewall da VPS para a internet
# (runners do GitHub não usam o seu IP local). Ver README → Deploy VPS → troubleshooting.
name: Deploy VPS

on:
  workflow_run:
    workflows: ["Publish Docker images"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Preparar host e porta SSH
        id: ssh
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ vars.VPS_SSH_PORT }}
        run: |
          set -euo pipefail
          HOST="${VPS_HOST#http://}"
          HOST="${HOST#https://}"
          HOST="${HOST%%/*}"
          HOST="${HOST%%:*}"
          PORT="${VPS_SSH_PORT:-22}"
          if [[ -z "$HOST" ]]; then
            echo "::error::Secret VPS_HOST vazio. Use só o IP (ex. 82.25.69.207), sem http://."
            exit 1
          fi
          echo "host=${HOST}" >> "$GITHUB_OUTPUT"
          echo "port=${PORT}" >> "$GITHUB_OUTPUT"

      - name: URLs públicas
        id: urls
        run: |
          APP="${{ vars.APP_PUBLIC_URL }}"
          APP="${APP%/}"
          if [[ -z "$APP" || "$APP" == "http://localhost" ]]; then
            echo "::error::Defina a variable APP_PUBLIC_URL (IP/domínio da VPS)."
            exit 1
          fi
          scheme="${APP%%://*}"
          rest="${APP#*://}"
          host="${rest%%/*}"
          KC="${{ vars.KEYCLOAK_PUBLIC_URL }}"
          if [[ -z "$KC" ]]; then
            KC="${scheme}://${host}:8180"
          fi
          echo "app_public_url=${APP}" >> "$GITHUB_OUTPUT"
          echo "keycloak_public_url=${KC}" >> "$GITHUB_OUTPUT"
          echo "public_host=${host}" >> "$GITHUB_OUTPUT"

      - name: Conferir VPS_HOST vs APP_PUBLIC_URL
        env:
          SSH_HOST: ${{ steps.ssh.outputs.host }}
        run: |
          PUB="${{ steps.urls.outputs.public_host }}"
          if [[ -n "$PUB" && "$SSH_HOST" != "$PUB" ]]; then
            echo "::warning::VPS_HOST (${SSH_HOST}) difere do host em APP_PUBLIC_URL (${PUB}). Confira o secret VPS_HOST."
          fi

      - name: Testar conectividade SSH (runner → VPS)
        env:
          SSH_HOST: ${{ steps.ssh.outputs.host }}
          SSH_PORT: ${{ steps.ssh.outputs.port }}
        run: |
          set -euo pipefail
          ok=0
          for attempt in 1 2 3; do
            if timeout 15 bash -c "echo >/dev/tcp/${SSH_HOST}/${SSH_PORT}" 2>/dev/null; then
              echo "Porta ${SSH_PORT} acessível a partir do runner (tentativa ${attempt})."
              ok=1
              break
            fi
            echo "Tentativa ${attempt}/3: timeout em ${SSH_PORT}."
            sleep 15
          done
          if [[ "$ok" -ne 1 ]]; then
            echo "::error::SSH inacessível do GitHub Actions (i/o timeout na porta ${SSH_PORT})."
            echo "::error::Libere TCP 22 no firewall da VPS para IPs externos (GitHub Actions ≠ seu IP local)."
            echo "::error::VPS_HOST deve ser só IP/hostname (sem http://). Ranges: https://api.github.com/meta (actions)."
            echo "::error::Deploy manual na VPS: cd /opt/gestao-fiscal/deploy && ./deploy.sh http://SEU_IP"
            exit 1
          fi

      - name: Enviar arquivos deploy (sem .env)
        uses: appleboy/scp-action@v1
        with:
          host: ${{ steps.ssh.outputs.host }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ steps.ssh.outputs.port }}
          timeout: 120s
          command_timeout: 15m
          source: >-
            deploy/docker-compose.yml,
            deploy/deploy.sh,
            deploy/patch-realm.py,
            deploy/config/keycloak/realm-entrevista.json,
            deploy/config/nginx/nginx.conf,
            deploy/config/theme/corporate.css
          target: ${{ vars.VPS_DEPLOY_PATH || '/opt/gestao-fiscal/deploy' }}
          strip_components: 1
          overwrite: true

      - name: Executar deploy na VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_URL: ${{ steps.urls.outputs.app_public_url }}
          KEYCLOAK_PUBLIC_URL: ${{ steps.urls.outputs.keycloak_public_url }}
          GHCR_REGISTRY: ghcr.io/${{ github.repository }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
          VPS_POSTGRES_PASSWORD: ${{ secrets.VPS_POSTGRES_PASSWORD }}
          VPS_KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.VPS_KEYCLOAK_ADMIN_PASSWORD }}
          DEPLOY_DIR: ${{ vars.VPS_DEPLOY_PATH || '/opt/gestao-fiscal/deploy' }}
        with:
          host: ${{ steps.ssh.outputs.host }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ steps.ssh.outputs.port }}
          timeout: 120s
          command_timeout: 30m
          envs: APP_URL,KEYCLOAK_PUBLIC_URL,GHCR_REGISTRY,GHCR_TOKEN,GHCR_USER,VPS_POSTGRES_PASSWORD,VPS_KEYCLOAK_ADMIN_PASSWORD,DEPLOY_DIR
          script: |
            set -euo pipefail
            mkdir -p "$DEPLOY_DIR/config/keycloak" "$DEPLOY_DIR/config/nginx" "$DEPLOY_DIR/config/theme"
            cd "$DEPLOY_DIR"
            chmod +x deploy.sh patch-realm.py
            REGISTRY="${GHCR_REGISTRY,,}"
            PG_PASS="${VPS_POSTGRES_PASSWORD:-gestao123}"
            KC_PASS="${VPS_KEYCLOAK_ADMIN_PASSWORD:-admin}"
            {
              echo "GHCR_REGISTRY=${REGISTRY}"
              echo "IMAGE_TAG=latest"
              echo "SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/gestao_fiscal"
              echo "SPRING_DATASOURCE_USERNAME=gestao"
              echo "SPRING_DATASOURCE_PASSWORD=${PG_PASS}"
              echo "APP_PUBLIC_URL=${APP_URL}"
              echo "KEYCLOAK_PUBLIC_URL=${KEYCLOAK_PUBLIC_URL}"
              echo "KEYCLOAK_ADMIN=admin"
              echo "KEYCLOAK_ADMIN_PASSWORD=${KC_PASS}"
            } > .env
            chmod 600 .env
            if [[ -n "${GHCR_TOKEN:-}" ]]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            ./deploy.sh "$APP_URL"
