name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '.sdkmanrc'
      - 'deploy/**'
      - 'scripts/**'
      - '.gitignore'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '.sdkmanrc'
      - 'deploy/**'
      - 'scripts/**'
      - '.gitignore'
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend-jsf: ${{ steps.filter.outputs.frontend-jsf }}
      frontend-angular: ${{ steps.filter.outputs.frontend-angular }}
      docker: ${{ steps.filter.outputs.docker }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'pom.xml'
            frontend-jsf:
              - 'frontend-jsf/**'
              - 'shared/**'
              - 'pom.xml'
            frontend-angular:
              - 'frontend-angular/**'
              - 'shared/**'
            docker:
              - 'backend/**'
              - 'frontend-jsf/**'
              - 'frontend-angular/**'
              - 'shared/**'
              - 'docker/**'
              - 'docker-compose.yml'
              - '**/Dockerfile'
              - '**/docker-entrypoint.sh'
              - 'keycloak/**'
            ci:
              - '.github/**'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build Backend
        working-directory: backend
        run: mvn -B verify
      - name: Upload Backend artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-jar
          path: backend/target/*.jar

  frontend-jsf:
    needs: changes
    if: needs.changes.outputs.frontend-jsf == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Test and Build JSF
        run: mvn -B -f frontend-jsf/pom.xml test package

  frontend-angular:
    needs: changes
    if: needs.changes.outputs.frontend-angular == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend-angular/package-lock.json
      - name: Install and Build Angular
        working-directory: frontend-angular
        run: |
          npm install --legacy-peer-deps
          npm run build

  static-analysis:
    needs: [changes, backend]
    if: >-
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true') &&
      needs.backend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: SpotBugs (backend)
        working-directory: backend
        run: mvn -B com.github.spotbugs:spotbugs-maven-plugin:4.8.6.0:check -Dspotbugs.failOnError=false || true

  docker:
    needs: [changes, backend, frontend-jsf, frontend-angular]
    if: >-
      (needs.changes.outputs.docker == 'true' || needs.changes.outputs.ci == 'true') &&
      !cancelled() &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped') &&
      (needs.frontend-jsf.result == 'success' || needs.frontend-jsf.result == 'skipped') &&
      (needs.frontend-angular.result == 'success' || needs.frontend-angular.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Validar build das imagens Docker
        run: |
          docker build -t gestao-fiscal-backend:ci ./backend
          docker build -f frontend-jsf/Dockerfile -t gestao-fiscal-jsf:ci .
          docker build -f frontend-angular/Dockerfile -t gestao-fiscal-angular:ci .
      # Publicação no GHCR: workflow publish-images.yml (push em main/master)
