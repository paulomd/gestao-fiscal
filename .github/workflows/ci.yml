name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build Backend
        working-directory: backend
        run: mvn -B verify
      - name: Upload Backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  frontend-jsf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build JSF
        run: mvn -B -f frontend-jsf/pom.xml -DskipTests package

  frontend-angular:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend-angular/package-lock.json
      - name: Install and Build Angular
        working-directory: frontend-angular
        run: |
          npm install --legacy-peer-deps
          npm run build

  static-analysis:
    runs-on: ubuntu-latest
    needs: [backend, frontend-jsf]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: SpotBugs (backend)
        working-directory: backend
        run: mvn -B com.github.spotbugs:spotbugs-maven-plugin:4.8.6.0:check -Dspotbugs.failOnError=false || true

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend-jsf, frontend-angular]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Backend Image
        run: docker build -t gestao-fiscal-backend:ci ./backend
      - name: Build JSF Image
        run: docker build -f frontend-jsf/Dockerfile -t gestao-fiscal-jsf:ci .
      - name: Build Angular Image
        run: docker build -f frontend-angular/Dockerfile -t gestao-fiscal-angular:ci .
