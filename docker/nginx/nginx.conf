# Gateway: API + JSF + Angular (Keycloak em :8180, sem proxy)
upstream backend {
    server backend:8082;
}

upstream frontend-jsf {
    server frontend-jsf:8081;
}

upstream frontend-angular {
    server frontend-angular:80;
}

server {
    listen 80;
    server_name localhost;

    proxy_connect_timeout 30s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    location /assets/theme/ {
        alias /usr/share/nginx/html/theme/;
        add_header Cache-Control "public, max-age=3600";
    }

    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /actuator/ {
        proxy_pass http://backend/actuator/;
        proxy_set_header Host $host;
    }

    location /swagger-ui/ {
        proxy_pass http://backend/swagger-ui/;
        proxy_set_header Host $host;
    }

    location /api-docs {
        proxy_pass http://backend/api-docs;
        proxy_set_header Host $host;
    }

    # OAuth2 + callback Spring Security (/login/oauth2/code/keycloak, /login?error)
    location ^~ /oauth2 {
        proxy_pass http://frontend-jsf;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location ^~ /login {
        proxy_pass http://frontend-jsf;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /logout {
        proxy_pass http://frontend-jsf;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /faces/ {
        proxy_pass http://frontend-jsf;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /jakarta.faces.resource/ {
        proxy_pass http://frontend-jsf;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location ~ \.xhtml$ {
        proxy_pass http://frontend-jsf;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location ~ ^/(apuracao-fiscal|historico|dashboard-angular)(/.*)?$ {
        proxy_pass http://frontend-angular;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
        return 302 /faces/dashboard.xhtml;
    }

    # Atalho explícito para login JSF (Keycloak via Spring OAuth2)
    location = /login-jsf {
        return 302 /oauth2/authorization/keycloak;
    }

    # URLs antigas do JSF → caminho servido pelo FacesServlet
    location = /dashboard.xhtml {
        return 302 /faces/dashboard.xhtml;
    }

    location = /aliquotas.xhtml {
        return 302 /faces/aliquotas.xhtml;
    }

    location / {
        proxy_pass http://frontend-angular;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
