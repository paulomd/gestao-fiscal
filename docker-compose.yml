# Postgres: profile docker-db (use scripts/start-all.sh ou COMPOSE_PROFILES=docker-db)
# Sem profile: apenas Keycloak + apps, com Postgres em host.docker.internal (.env)
services:
  postgres:
    profiles: ["docker-db"]
    image: postgres:16-alpine
    container_name: gestao-fiscal-postgres
    environment:
      POSTGRES_DB: gestao_fiscal
      POSTGRES_USER: gestao
      POSTGRES_PASSWORD: gestao123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestao -d gestao_fiscal"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: gestao-fiscal-keycloak
    # Não use KC_HOSTNAME* (v1) — quebra o start no KC 24; hostname via CLI
    command:
      - start-dev
      - --import-realm
      - --hostname-strict=false
      - --hostname-url=http://localhost:8180
    restart: unless-stopped
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_RELATIVE_PATH: /
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY: none
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-entrevista.json:/opt/keycloak/data/import/realm-entrevista.json:ro
    healthcheck:
      # Imagem oficial não tem curl; bash + /dev/tcp (Host: localhost por causa do --hostname-url)
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /realms/entrevista HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && head -1 <&3 | grep -q 200'"]
      interval: 5s
      timeout: 10s
      retries: 36
      start_period: 120s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestao-fiscal-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/gestao_fiscal}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-gestao}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-gestao123}
      APP_CORS_ORIGINS: http://localhost,http://localhost:4200,http://localhost:8081,http://localhost:8082
    ports:
      - "8082:8082"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/actuator/health/liveness | grep -q UP || curl -sf http://localhost:8082/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 150s

  frontend-jsf:
    build:
      context: .
      dockerfile: frontend-jsf/Dockerfile
    container_name: gestao-fiscal-jsf
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      API_BASE_URL: http://backend:8082
      ANGULAR_BASE_URL: http://localhost
      PUBLIC_BASE_URL: http://localhost
      OAUTH2_REDIRECT_URI: http://localhost/login/oauth2/code/keycloak
      OAUTH2_POST_LOGOUT_REDIRECT_URI: http://localhost/login-jsf
      KEYCLOAK_CLIENT_ID: legacy-jsf
      KEYCLOAK_LOGOUT_ISSUER: http://localhost:8180/realms/entrevista
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8081/actuator/health/liveness 2>/dev/null | grep -q UP || curl -sf http://127.0.0.1:8081/actuator/health 2>/dev/null | grep -q UP"]
      interval: 15s
      timeout: 10s
      retries: 24
      start_period: 180s

  frontend-angular:
    build:
      context: .
      dockerfile: frontend-angular/Dockerfile
    container_name: gestao-fiscal-angular
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/index.html | grep -q app-root || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  gateway:
    image: nginx:1.27-alpine
    container_name: gestao-fiscal-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./shared/theme:/usr/share/nginx/html/theme:ro
    depends_on:
      frontend-angular:
        condition: service_healthy
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      frontend-jsf:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/dashboard-angular 2>/dev/null | grep -q app-root"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  postgres_data:
