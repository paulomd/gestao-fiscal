<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

<f:metadata>
    <f:viewAction action="#{dashboardBean.carregar}" onPostback="false"/>
</f:metadata>

<ui:composition template="/WEB-INF/templates/layout.xhtml">
    <ui:define name="content">
        <h2 class="page-title">Dashboard</h2>

        <p>Bem-vindo, <strong>#{sessionBean.nomeUsuario}</strong>. Perfil: <strong>#{sessionBean.perfil}</strong>.
           Último acesso: <strong>#{sessionBean.ultimoAcesso}</strong>.</p>

        <div class="card-grid">
            <div class="stat-card">
                <h3>Total de Alíquotas</h3>
                <div class="value">#{dashboardBean.totalAliquotas}</div>
            </div>
            <div class="stat-card">
                <h3>Última Vigência</h3>
                <div class="value" style="font-size:1.25rem">#{dashboardBean.ultimaVigencia}</div>
            </div>
            <div class="stat-card">
                <h3>Total de Regimes Tributários</h3>
                <div class="value">#{dashboardBean.totalRegimes}</div>
            </div>
        </div>
    </ui:define>
</ui:composition>
</html>
